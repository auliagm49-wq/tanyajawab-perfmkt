<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TanyaJawab PerformanceMarketing</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f7f7f7; color: #222; }
    a { text-decoration: none; color: inherit; }

    /* NAV */
    nav { background: #fff; border-bottom: 1px solid #eee; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .logo-icon { background: #6C63FF; color: #fff; border-radius: 10px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
    .logo-text { font-weight: 700; font-size: 13px; color: #6C63FF; line-height: 1.3; }
    .nav-right { display: flex; gap: 10px; align-items: center; }
    .btn-primary { background: #6C63FF; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-weight: 600; font-size: 14px; cursor: pointer; }
    .btn-outline { background: #fff; color: #6C63FF; border: 1.5px solid #6C63FF; border-radius: 8px; padding: 8px 18px; font-weight: 600; font-size: 14px; cursor: pointer; }
    .btn-ghost { background: transparent; color: #888; border: none; font-size: 13px; cursor: pointer; padding: 6px 10px; }
    .btn-danger { background: #fff; color: #e24b4a; border: 1.5px solid #e24b4a; border-radius: 8px; padding: 8px 16px; font-weight: 600; font-size: 14px; cursor: pointer; }

    /* LAYOUT */
    .page { max-width: 900px; margin: 0 auto; padding: 32px 16px 60px; }

    /* HERO */
    .section-label { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: 1.5px; margin-bottom: 10px; }
    .hero-card { background: #fff; border: 1.5px solid #e8e8e8; border-radius: 16px; padding: 28px; cursor: pointer; }
    .hero-card:hover { border-color: #6C63FF; }
    .hero-q { font-size: 20px; font-weight: 700; color: #222; margin-bottom: 6px; line-height: 1.35; }
    .hero-meta { font-size: 13px; color: #aaa; margin-bottom: 20px; }
    .bubbles { display: flex; flex-direction: column; gap: 10px; }
    .bubble { border-radius: 12px; padding: 12px 16px; font-size: 14px; line-height: 1.6; max-width: 85%; }
    .bubble-q { background: #f5f5f5; color: #333; border-bottom-left-radius: 2px; }
    .bubble-a { background: #EEEDFE; color: #3a3479; border-bottom-right-radius: 2px; align-self: flex-end; }
    .bubble-author { font-size: 12px; color: #6C63FF; font-weight: 600; margin-bottom: 4px; text-align: right; }
    .explore-link { margin-top: 14px; font-size: 13px; color: #6C63FF; font-weight: 600; }

    /* GRID */
    .section-title { font-size: 17px; font-weight: 700; color: #222; margin-bottom: 16px; margin-top: 40px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card { background: #fff; border: 1.5px solid #e8e8e8; border-radius: 12px; padding: 20px; cursor: pointer; }
    .card:hover { border-color: #6C63FF; }
    .card-q { font-size: 14px; font-weight: 600; color: #222; margin-bottom: 8px; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { font-size: 12px; color: #999; }
    .card-link { margin-top: 10px; font-size: 12px; color: #6C63FF; font-weight: 600; }
    .tag { background: #EEEDFE; color: #6C63FF; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700; display: inline-block; margin-bottom: 10px; }

    /* FORM */
    .form-wrap { max-width: 480px; margin: 0 auto; background: #fff; border: 1.5px solid #eee; border-radius: 16px; padding: 32px; }
    .form-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .form-sub { font-size: 13px; color: #888; margin-bottom: 24px; }
    label { font-size: 13px; color: #555; font-weight: 600; margin-bottom: 4px; display: block; margin-top: 14px; }
    input, textarea { width: 100%; border: 1.5px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; font-family: sans-serif; }
    input:focus, textarea:focus { border-color: #6C63FF; }
    textarea { resize: vertical; min-height: 100px; }
    .err { color: #e24b4a; font-size: 12px; margin-top: 4px; }
    .full-btn { width: 100%; padding: 12px 0; margin-top: 16px; font-size: 15px; }

    /* DETAIL */
    .back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: #6C63FF; font-weight: 600; font-size: 14px; cursor: pointer; margin-bottom: 24px; padding: 0; }
    .detail-wrap { max-width: 640px; margin: 0 auto; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .avatar-user { background: #eee; color: #888; }
    .avatar-author { background: #6C63FF; color: #fff; }
    .bubble-row { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 14px; }
    .bubble-row-right { flex-direction: row-reverse; }

    /* ADMIN */
    .admin-card { background: #fff; border: 1.5px solid #e8e8e8; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .badge-pending { background: #faeeda; color: #ba7517; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700; }
    .badge-published { background: #eaf3de; color: #3b6d11; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700; }
    .email-tag { font-size: 12px; color: #6C63FF; margin-top: 4px; }
    .q-box { background: #f8f8f8; border-radius: 8px; padding: 10px 14px; font-size: 14px; color: #333; margin: 12px 0; font-style: italic; }
    .action-row { display: flex; gap: 8px; margin-top: 10px; }

    /* LOGIN */
    .login-wrap { max-width: 360px; margin: 60px auto; background: #fff; border: 1.5px solid #eee; border-radius: 16px; padding: 32px; }

    /* SUCCESS */
    .success-wrap { max-width: 420px; margin: 60px auto; text-align: center; }
    .success-icon { font-size: 48px; margin-bottom: 12px; }

    /* EMPTY */
    .empty { text-align: center; color: #aaa; font-size: 14px; margin-top: 60px; }

    /* LOADING */
    .loading { text-align: center; color: #aaa; font-size: 14px; padding: 40px; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
  // ============================================================
  // KONFIGURASI — ganti dengan milik kamu
  // ============================================================
  const SUPABASE_URL = 'GANTI_DENGAN_PROJECT_URL_KAMU';
  const SUPABASE_ANON_KEY = 'GANTI_DENGAN_ANON_KEY_KAMU';
  const ADMIN_PASSWORD = 'AuliaTester081966';
  // ============================================================

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let state = {
    view: 'home', // home | form | detail | login | admin
    posts: [],
    selected: null,
    isAdmin: false,
    loading: true,
    submitted: false,
    replyTexts: {},
    formData: { name: '', job: '', email: '', question: '' },
    formErrors: {},
    pwInput: '',
    pwError: false,
  };

  function setState(patch) {
    state = { ...state, ...patch };
    render();
  }

  // ============================================================
  // SUPABASE HELPERS
  // ============================================================
  async function loadPosts() {
    const { data } = await db.from('questions').select('*').order('date', { ascending: false });
    setState({ posts: data || [], loading: false });
  }

  async function submitQuestion(formData) {
    await db.from('questions').insert([{ ...formData, status: 'pending', date: new Date().toISOString().slice(0,10) }]);
    await loadPosts();
  }

  async function publishQuestion(id, answer) {
    await db.from('questions').update({ status: 'published', answer, date: new Date().toISOString().slice(0,10) }).eq('id', id);
    await loadPosts();
  }

  async function rejectQuestion(id) {
    await db.from('questions').delete().eq('id', id);
    await loadPosts();
  }

  // ============================================================
  // HELPERS
  // ============================================================
  function el(tag, attrs, ...children) {
    const e = document.createElement(tag);
    if (attrs) Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'class') e.className = v;
      else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    });
    children.flat().forEach(c => e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
    return e;
  }
  function div(cls, ...children) { return el('div', { class: cls }, ...children); }
  function txt(tag, cls, text) { const e = document.createElement(tag); e.className = cls; e.textContent = text; return e; }

  const published = () => state.posts.filter(p => p.status === 'published');
  const pending = () => state.posts.filter(p => p.status === 'pending');

  // ============================================================
  // RENDER NAV
  // ============================================================
  function renderNav() {
    const logo = div('logo');
    logo.onclick = () => setState({ view: 'home' });
    const icon = div('logo-icon'); icon.textContent = 'Q';
    const logoTxt = div('logo-text'); logoTxt.innerHTML = 'TanyaJawab<br>PerformanceMarketing';
    logo.append(icon, logoTxt);

    const right = div('nav-right');
    if (state.isAdmin) {
      const info = el('span', { style: 'font-size:13px;color:#888' }, 'Mode Admin');
      const out = el('button', { class: 'btn-ghost', onClick: () => setState({ isAdmin: false, view: 'home' }) }, 'Keluar');
      right.append(info, out);
    } else {
      const adminBtn = el('button', { class: 'btn-outline', onClick: () => setState({ view: 'login', pwInput: '', pwError: false }) }, 'Admin');
      const tanyaBtn = el('button', { class: 'btn-primary', onClick: () => setState({ view: 'form', submitted: false, formData: { name:'',job:'',email:'',question:'' }, formErrors: {} }) }, '+ Tanya');
      right.append(adminBtn, tanyaBtn);
    }

    const nav = el('nav');
    nav.append(logo, right);
    return nav;
  }

  // ============================================================
  // RENDER HOME
  // ============================================================
  function renderHome() {
    const page = div('page');

    if (state.loading) {
      page.append(div('loading', 'Memuat...'));
      return page;
    }

    const pub = published();
    const featured = pub[0];
    const thumbs = pub.slice(1);

    // Hero title
    const hero = div('');
    hero.style.textAlign = 'center';
    hero.style.marginBottom = '36px';
    const h1 = document.createElement('h1');
    h1.style.cssText = 'font-size:30px;font-weight:800;line-height:1.2;margin-bottom:10px';
    h1.innerHTML = 'Tanya Jawab Seputar<br>Performance Marketing';
    const sub = el('p', { style: 'font-size:15px;color:#888' }, 'Kirim pertanyaan, author akan menjawab yang terpilih');
    hero.append(h1, sub);
    page.append(hero);

    if (featured) {
      const label = div('section-label'); label.textContent = 'TERPILIH';
      const card = div('hero-card');
      card.onclick = () => setState({ view: 'detail', selected: featured });

      const meta = div('hero-meta'); meta.textContent = `${featured.name} · ${featured.job} · ${featured.date}`;

      const bubbles = div('bubbles');
      const bq = div('bubble bubble-q'); bq.textContent = featured.question;
      bubbles.append(bq);
      if (featured.answer) {
        const aWrap = div(''); aWrap.style.alignSelf = 'flex-end'; aWrap.style.maxWidth = '85%';
        const auth = div('bubble-author'); auth.textContent = 'Tim Admin';
        const ba = div('bubble bubble-a'); ba.textContent = featured.answer.slice(0, 90) + (featured.answer.length > 90 ? '...' : '');
        aWrap.append(auth, ba);
        bubbles.append(aWrap);
      }
      const link = div('explore-link'); link.textContent = 'Baca selengkapnya →';
      card.append(q, meta, bubbles, link);
      page.append(label, card);
    }

    if (thumbs.length > 0) {
      const st = div('section-title'); st.textContent = 'Pertanyaan Sebelumnya';
      const grid = div('grid');
      thumbs.forEach(p => {
        const card = div('card');
        card.onclick = () => setState({ view: 'detail', selected: p });
        const meta = div('card-meta'); meta.textContent = `${p.name} · ${p.job} · ${p.date}`;
        const bq = div('bubble bubble-q'); bq.style.fontSize = '13px'; bq.style.marginTop = '8px'; bq.textContent = p.question.slice(0, 90) + (p.question.length > 90 ? '...' : '');
        const lnk = div('card-link'); lnk.textContent = 'Baca selengkapnya →';
        card.append(meta, bq, lnk);
        grid.append(card);
      });
      page.append(st, grid);
    }

    if (pub.length === 0) {
      const empty = div('empty'); empty.textContent = 'Belum ada postingan. Jadilah yang pertama bertanya!';
      page.append(empty);
    }

    return page;
  }

  // ============================================================
  // RENDER DETAIL
  // ============================================================
  function renderDetail() {
    const p = state.selected;
    const page = div('page');
    const back = el('button', { class: 'back-btn', onClick: () => setState({ view: 'home' }) }, '← Kembali');
    const wrap = div('detail-wrap');

    const tag = div('tag'); tag.textContent = 'Q&A';
    const meta = el('p', { style: 'font-size:13px;color:#aaa;margin-bottom:20px' }, `${p.date} · ${p.job}`);

    // Question bubble
    const qRow = div('bubble-row');
    const avU = div('avatar avatar-user'); avU.textContent = p.name[0].toUpperCase();
    const qSide = div('');
    const qMeta = el('div', { style: 'font-size:12px;color:#aaa;margin-bottom:4px' }, `${p.name}, ${p.job}`);
    const bq = div('bubble bubble-q'); bq.textContent = p.question;
    qSide.append(qMeta, bq);
    qRow.append(avU, qSide);

    wrap.append(tag, meta, qRow);

    if (p.answer) {
      const aRow = div('bubble-row bubble-row-right');
      const avA = div('avatar avatar-author'); avA.textContent = 'A';
      const aSide = div('');
      const aAuth = div('bubble-author'); aAuth.textContent = 'Tim Admin';
      const ba = div('bubble bubble-a'); ba.textContent = p.answer;
      aSide.append(aAuth, ba);
      aRow.append(avA, aSide);
      wrap.append(aRow);
    }

    page.append(back, wrap);
    return page;
  }

  // ============================================================
  // RENDER FORM
  // ============================================================
  function renderForm() {
    const page = div('page');
    if (state.submitted) {
      const wrap = div('success-wrap');
      const icon = div('success-icon'); icon.textContent = '✅';
      const title = el('h2', { style: 'font-size:20px;font-weight:700;margin-bottom:8px' }, 'Pertanyaan Terkirim!');
      const sub = el('p', { style: 'font-size:14px;color:#888;margin-bottom:24px' }, 'Kami akan menjawabnya jika terpilih untuk ditayangkan.');
      const btn = el('button', { class: 'btn-primary', onClick: () => setState({ view: 'home' }) }, 'Kembali ke Beranda');
      wrap.append(icon, title, sub, btn);
      page.append(wrap);
      return page;
    }

    const wrap = div('form-wrap');
    const title = div('form-title'); title.textContent = 'Ajukan Pertanyaan';
    const sub = div('form-sub'); sub.textContent = 'Pertanyaan yang terpilih akan dijawab dan ditayangkan.';
    wrap.append(title, sub);

    const fields = [
      { key: 'name', label: 'Nama / Alias *', type: 'text', placeholder: 'Contoh: Budi atau BudiMarketer' },
      { key: 'job', label: 'Pekerjaan *', type: 'text', placeholder: 'Contoh: Content Creator, Pemilik UMKM' },
      { key: 'email', label: 'Email * (tidak ditampilkan publik)', type: 'email', placeholder: 'email@kamu.com' },
    ];

    fields.forEach(f => {
      const lbl = el('label', {}, f.label);
      const inp = el('input', { type: f.type, placeholder: f.placeholder, value: state.formData[f.key] });
      inp.oninput = e => { state.formData[f.key] = e.target.value; };
      wrap.append(lbl, inp);
      if (state.formErrors[f.key]) {
        const err = div('err'); err.textContent = state.formErrors[f.key];
        wrap.append(err);
      }
    });

    const lbl = el('label', {}, 'Pertanyaan *');
    const ta = el('textarea', { placeholder: 'Tulis pertanyaanmu di sini...' });
    ta.value = state.formData.question;
    ta.oninput = e => { state.formData.question = e.target.value; };
    wrap.append(lbl, ta);
    if (state.formErrors.question) {
      const err = div('err'); err.textContent = state.formErrors.question;
      wrap.append(err);
    }

    const submitBtn = el('button', { class: 'btn-primary full-btn' }, 'Kirim Pertanyaan');
    submitBtn.onclick = async () => {
      const errors = {};
      const fd = state.formData;
      if (!fd.name.trim()) errors.name = 'Wajib diisi';
      if (!fd.job.trim()) errors.job = 'Wajib diisi';
      if (!fd.email.trim() || !/\S+@\S+\.\S+/.test(fd.email)) errors.email = 'Email tidak valid';
      if (!fd.question.trim()) errors.question = 'Wajib diisi';
      if (Object.keys(errors).length) { setState({ formErrors: errors }); return; }
      await submitQuestion(state.formData);
      setState({ submitted: true });
    };

    const cancelBtn = el('button', { class: 'btn-ghost full-btn', onClick: () => setState({ view: 'home' }) }, 'Batal');
    wrap.append(submitBtn, cancelBtn);
    page.append(wrap);
    return page;
  }

  // ============================================================
  // RENDER LOGIN
  // ============================================================
  function renderLogin() {
    const page = div('page');
    const wrap = div('login-wrap');
    const title = el('div', { style: 'font-size:20px;font-weight:700;margin-bottom:6px' }, 'Login Author');
    const sub = el('div', { style: 'font-size:13px;color:#888;margin-bottom:24px' }, 'Masuk untuk mengelola pertanyaan');
    const lbl = el('label', {}, 'Password');
    const inp = el('input', { type: 'password', placeholder: 'Masukkan password', value: state.pwInput });
    inp.oninput = e => { state.pwInput = e.target.value; };
    inp.onkeydown = e => { if (e.key === 'Enter') doLogin(); };
    const errEl = div('err');
    if (state.pwError) errEl.textContent = 'Password salah.';
    const loginBtn = el('button', { class: 'btn-primary full-btn' }, 'Masuk');
    loginBtn.onclick = doLogin;
    const cancelBtn = el('button', { class: 'btn-ghost full-btn', onClick: () => setState({ view: 'home' }) }, 'Batal');
    wrap.append(title, sub, lbl, inp, errEl, loginBtn, cancelBtn);
    page.append(wrap);
    return page;
  }

  function doLogin() {
    if (state.pwInput === ADMIN_PASSWORD) {
      setState({ isAdmin: true, view: 'admin', pwError: false });
    } else {
      setState({ pwError: true });
    }
  }

  // ============================================================
  // RENDER ADMIN
  // ============================================================
  function renderAdmin() {
    const page = div('page');
    const title = el('div', { style: 'font-size:20px;font-weight:700;margin-bottom:4px' }, 'Panel Admin');
    const sub = el('div', { style: 'font-size:13px;color:#888;margin-bottom:24px' }, 'Kelola pertanyaan masuk. Hanya kamu yang bisa melihat halaman ini.');
    page.append(title, sub);

    const pend = pending();
    if (pend.length === 0) {
      const empty = el('div', { style: 'color:#aaa;font-size:14px' }, 'Tidak ada pertanyaan baru yang menunggu.');
      page.append(empty);
    }

    pend.forEach(p => {
      const card = div('admin-card');
      const top = el('div', { style: 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px' });
      const left = div('');
      const badge = div('badge-pending'); badge.textContent = 'Menunggu';
      const name = el('div', { style: 'font-size:15px;font-weight:700;margin-top:8px' }); name.textContent = `${p.name} — `;
      const jobSpan = el('span', { style: 'font-weight:400;color:#888' }, p.job);
      name.append(jobSpan);
      const email = div('email-tag'); email.textContent = `📧 ${p.email}`;
      left.append(badge, name, email);
      const dateEl = el('div', { style: 'font-size:12px;color:#aaa' }, p.date);
      top.append(left, dateEl);

      const qbox = div('q-box'); qbox.textContent = `"${p.question}"`;

      const lbl = el('label', {}, 'Tulis jawaban:');
      const ta = el('textarea', { placeholder: 'Ketik jawaban kamu di sini...' });
      ta.style.minHeight = '80px';
      ta.oninput = e => { state.replyTexts[p.id] = e.target.value; };

      const actions = div('action-row');
      const pubBtn = el('button', { class: 'btn-primary' }, 'Tayangkan');
      pubBtn.onclick = async () => {
        const ans = state.replyTexts[p.id] || '';
        if (!ans.trim()) { alert('Tulis jawaban dulu ya!'); return; }
        await publishQuestion(p.id, ans);
      };
      const rejBtn = el('button', { class: 'btn-danger' }, 'Tolak');
      rejBtn.onclick = async () => { if (confirm('Yakin mau tolak & hapus pertanyaan ini?')) await rejectQuestion(p.id); };
      actions.append(pubBtn, rejBtn);

      card.append(top, qbox, lbl, ta, actions);
      page.append(card);
    });

    const pub = published();
    if (pub.length > 0) {
      const st = div('section-title'); st.textContent = `Sudah Ditayangkan (${pub.length})`;
      page.append(st);
      pub.forEach(p => {
        const card = div('admin-card'); card.style.opacity = '0.7';
        const row = el('div', { style: 'display:flex;justify-content:space-between;align-items:center' });
        const name = el('div', { style: 'font-size:14px;font-weight:600' }); name.textContent = `${p.name} — `;
        const jobSpan = el('span', { style: 'font-weight:400;color:#888' }, p.job);
        name.append(jobSpan);
        const badge = div('badge-published'); badge.textContent = 'Tayang';
        row.append(name, badge);
        const q = el('div', { style: 'font-size:13px;color:#666;margin-top:6px' }); q.textContent = `"${p.question.slice(0, 80)}..."`;
        card.append(row, q);
        page.append(card);
      });
    }

    return page;
  }

  // ============================================================
  // MAIN RENDER
  // ============================================================
  function render() {
    const app = document.getElementById('app');
    app.innerHTML = '';
    app.append(renderNav());
    if (state.view === 'home') app.append(renderHome());
    else if (state.view === 'form') app.append(renderForm());
    else if (state.view === 'detail') app.append(renderDetail());
    else if (state.view === 'login') app.append(renderLogin());
    else if (state.view === 'admin') app.append(renderAdmin());
  }

  // INIT
  loadPosts();
  render();
</script>
</body>
</html>
